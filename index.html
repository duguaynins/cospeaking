<script>
async function HuggingFaceAPI(inputs=null) {
  // 20251205
  try {
    console.log(inputs);
    const { group, space, path, payload } = inputs;
    const baseUrl = `https://${group}-${space}.hf.space/${path}`;  ///"https://duguaynins-RedirectAPI.hf.space/path";

    const response = await fetch(baseUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    return await response;

    const data = await response.json();
    console.log(data);
    return data;
  
  } catch (err) {
    console.error(err);
    ///return "error";
    ///return "Server? Wake up!";

    ///return "Server? Together!";
    ///return {result: {confidences: null, label: '<b translate="no">'+escapeHtml(err.stack)+'</b>' }};  ///err.name+err.message
    return {result: {confidences: null, label: `<a translate="no" href="mailto:duguaynins@gmail.com?subject=${encodeURIComponent( new Date().toISOString() )}&body=${encodeURIComponent( err.stack )}">mailto:duguaynins@gmail.com</a>` }};  ///escapeHtml(err.stack)
  }
}


async function send() {
    const buffer = document.getElementById("input_msg").value;
    const encode = encodeURIComponent(buffer);
    const traget = "ro";
  
    const outputs_tts = await HuggingFaceAPI({
      group: "duguaynins",
      space: "RedirectAPI",
      path: `tts?text=${encode}&lang=${traget}`,  ///embeddings/meta
      ///payload: inputs,
    }); 
    const blob = await outputs_tts.blob();    
    const object = URL.createObjectURL(blob);

    const audio = new Audio(); // ✅ 先建立 audio 物件
    audio.src = object;
    audio.play();
    audio.onended = () => URL.revokeObjectURL(object);  // 播放完釋放資源

    
    setTimeout(() => { document.getElementById("input_msg").style.background = "orange"; }, 1);  // 單位是毫秒
    setTimeout(() => { document.getElementById("input_msg").style.background = "white"; }, 1000);  // 單位是毫秒  */
}

document.getElementById("input_msg").addEventListener("keydown", function(event) {
    // event.key === "Enter" 表示按下 Enter
    if (event.key === "Enter") {
        event.preventDefault(); // 防止換行（如果是 textarea）
        send();                 // 呼叫送出函數
    }
});
</script>
